# nginx.conf · Tinta privacy site
server {
    # Railway inyecta $PORT como variable; nginx escucha aquí
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tipo MIME correcto
    charset utf-8;

    # Compresión gzip para HTML
    gzip on;
    gzip_types text/html text/css application/javascript;

    # Cabeceras de seguridad básicas
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Ruta raíz → política de privacidad
    location = / {
        try_files /index.html =404;
    }

    # Ruta /privacy → política (para que ambas URLs funcionen)
    location = /privacy {
        return 301 /;
    }
    location = /privacy/ {
        return 301 /;
    }

    # Ruta /delete-account → página de eliminación
    location = /delete-account {
        return 301 /delete-account/;
    }
    location /delete-account/ {
        try_files /delete-account/index.html =404;
    }

    # 404 personalizado opcional (cae a la política)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a archivos ocultos
    location ~ /\. {
        deny all;
    }
}
